<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Entity Corpus Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6; --bg-deep: #f0ede7; --panel: #fff; --panel-border: #e4dfd5;
  --panel-soft: #f5f2ec; --text: #1f1c1a; --text-soft: #4a4540; --text-dim: #8a8278;
  --accent: #cc785c; --accent-deep: #a34b2c; --accent-soft: #f5e6de;
  --green: #3d8b5e; --green-soft: #e8f5ee;
  --yellow: #b8860b; --yellow-soft: #fef9e7;
  --red: #c0392b; --red-soft: #fdf0ef;
  --blue: #2980b9; --blue-soft: #eaf4fb;
  --serif: "Fraunces", Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
}
[data-theme="dark"] {
  --bg: #181614; --bg-deep: #111009; --panel: #222019; --panel-border: #333028;
  --panel-soft: #1e1c1a; --text: #e8e0d6; --text-soft: #b0a89e; --text-dim: #6b6358;
  --accent: #cc785c; --accent-deep: #e8926e; --accent-soft: #2a1e17;
  --green: #4caf78; --green-soft: #0e2318;
  --yellow: #d4a017; --yellow-soft: #1e1800;
  --red: #e05252; --red-soft: #250e0e;
  --blue: #5b9bd5; --blue-soft: #0d1e30;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-soft); font: 14px/1.55 var(--sans);
  min-height: 100vh; -webkit-font-smoothing: antialiased; }
h1, h2, h3 { font-family: var(--serif); font-weight: 500; letter-spacing: -0.01em; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px; border-bottom: 1px solid var(--panel-border);
  background: var(--bg); position: sticky; top: 0; z-index: 100;
}
.brand { display: flex; align-items: baseline; gap: 12px; }
.brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); align-self: center; }
.title { font-family: var(--serif); font-weight: 500; font-size: 20px; color: var(--text); }
.sub { color: var(--text-dim); font-size: 12px; font-family: var(--mono); }
.header-right { display: flex; align-items: center; gap: 16px; }
.updated { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.stats-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--panel-border);
  background: var(--bg-deep);
}
.stat { flex: 1; padding: 12px 20px; border-right: 1px solid var(--panel-border); }
.stat:last-child { border-right: none; }
.stat-num { font-size: 26px; font-family: var(--serif); font-weight: 500; color: var(--text); line-height: 1; }
.stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.stat-num.green { color: var(--green); }
.stat-num.yellow { color: var(--yellow); }
.stat-num.blue { color: var(--blue); }

main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

.panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 6px;
  box-shadow: 0 1px 2px rgba(31,28,26,.03); overflow: hidden; }
.panel-header { display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--panel-border); background: var(--panel-soft); }
.panel-header h2 { margin: 0; font-size: 15px; color: var(--text); }
.panel-hint { font-size: 12px; color: var(--text-dim); }

/* Corpus table */
.corpus-table { width: 100%; border-collapse: collapse; }
.corpus-table th { padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim);
  border-bottom: 1px solid var(--panel-border); background: var(--panel-soft);
  cursor: pointer; user-select: none; white-space: nowrap; }
.corpus-table th:hover { color: var(--text); }
.corpus-table th .sort-arrow { margin-left: 4px; opacity: 0.4; }
.corpus-table th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
.corpus-table td { padding: 10px 14px; border-bottom: 1px solid var(--panel-border);
  vertical-align: middle; }
.corpus-table tr:last-child td { border-bottom: none; }
.corpus-table tr { cursor: pointer; transition: background 0.1s; }
.corpus-table tr:hover td { background: var(--panel-soft); }
.corpus-table tr.selected td { background: var(--accent-soft); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge.stable { background: var(--green-soft); color: var(--green); }
.badge.draft { background: var(--yellow-soft); color: var(--yellow); }
.badge.unknown { background: var(--bg-deep); color: var(--text-dim); }

.domain-tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px;
  font-family: var(--mono); }
.domain-tag.demand_theory { background: #f0e6f6; color: #6c3483; }
.domain-tag.go_to_market { background: #e8f5fd; color: #1a6b96; }
.domain-tag.product { background: #eaf6f6; color: #1a7070; }
.domain-tag.research { background: #fef9e7; color: #7d6608; }

.file-count { font-family: var(--mono); font-size: 12px; }
.file-count.ok { color: var(--green); }
.file-count.mismatch { color: var(--yellow); }
.file-count.missing { color: var(--red); }

.tier-pills { display: flex; flex-wrap: wrap; gap: 4px; }
.tier-pill { font-size: 10px; font-family: var(--mono); padding: 1px 6px;
  border-radius: 3px; background: var(--bg-deep); color: var(--text-dim); }

.name-cell { font-weight: 500; color: var(--text); font-family: var(--mono); font-size: 13px; }
.domain-cell { font-size: 12px; color: var(--text-dim); max-width: 200px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Hierarchy group headers */
.group-row td { padding: 7px 14px 6px; background: var(--bg-deep);
  border-top: 2px solid var(--panel-border); border-bottom: 1px solid var(--panel-border);
  cursor: pointer; user-select: none; }
.group-row:first-child td { border-top: none; }
.group-header { display: flex; align-items: center; gap: 10px; }
.group-icon { font-size: 15px; line-height: 1; }
.group-name { font-family: var(--serif); font-weight: 500; font-size: 14px; color: var(--text); }
.group-desc { font-size: 11px; color: var(--text-dim); font-style: italic; }
.group-count { margin-left: auto; font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); background: var(--panel-border); padding: 1px 7px; border-radius: 8px; }
.group-chevron { font-size: 11px; color: var(--text-dim); margin-left: 6px; transition: transform 0.15s; }
.group-row.collapsed .group-chevron { transform: rotate(-90deg); }
.group-row td { transition: background 0.1s; }
.group-row:hover td { background: var(--panel-soft); }

/* Indent corpus rows within groups */
.corpus-table tr.in-group td:first-child { padding-left: 10px; }
.indent-arrow { font-family: var(--mono); color: var(--text-dim); font-size: 11px; margin-right: 4px; }

/* Compact tier pills in table */
.tier-pills { display: flex; flex-wrap: nowrap; gap: 3px; }
.tier-pill { font-size: 10px; font-family: var(--mono); padding: 1px 5px;
  border-radius: 3px; background: var(--bg-deep); color: var(--text-dim);
  white-space: nowrap; }

/* Detail panel */
.detail-panel { display: none; }
.detail-panel.open { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.detail-section { padding: 16px 20px; border-right: 1px solid var(--panel-border); }
.detail-section:last-child { border-right: none; }
.detail-section h3 { margin: 0 0 10px; font-size: 13px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--sans); font-weight: 500; }
.close-btn { cursor: pointer; color: var(--text-dim); font-size: 18px; line-height: 1;
  padding: 0 4px; }
.close-btn:hover { color: var(--accent); }

.doc-list { list-style: none; margin: 0; padding: 0; }
.doc-list li { display: flex; align-items: center; gap: 8px; padding: 4px 0;
  border-bottom: 1px solid var(--panel-border); font-size: 12px; font-family: var(--mono); }
.doc-list li:last-child { border-bottom: none; }
.doc-id { font-weight: 500; color: var(--text); width: 28px; flex-shrink: 0; }
.doc-group { padding: 1px 5px; border-radius: 3px; font-size: 10px; flex-shrink: 0;
  background: var(--blue-soft); color: var(--blue); }
.doc-file { color: var(--text-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.theory-block { background: var(--bg-deep); border-radius: 4px; padding: 10px 12px;
  font-family: var(--mono); font-size: 12px; color: var(--text-soft); white-space: pre-wrap;
  max-height: 160px; overflow-y: auto; line-height: 1.6; }

.trigger-list { display: flex; flex-direction: column; gap: 4px; }
.trigger-item { font-size: 12px; font-family: var(--mono); color: var(--text-dim);
  padding: 3px 8px; background: var(--bg-deep); border-radius: 3px; }

.file-listing { list-style: none; margin: 0; padding: 0; max-height: 180px; overflow-y: auto; }
.file-listing li { display: flex; justify-content: space-between; padding: 3px 0;
  border-bottom: 1px solid var(--panel-border); font-size: 12px; font-family: var(--mono); }
.file-listing li:last-child { border-bottom: none; }
.file-size { color: var(--text-dim); flex-shrink: 0; margin-left: 8px; }

.root-badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono);
  font-size: 12px; padding: 3px 8px; border-radius: 4px; }
.root-badge.ok { background: var(--green-soft); color: var(--green); }
.root-badge.missing { background: var(--red-soft); color: var(--red); }

/* Miss log */
.miss-table { width: 100%; border-collapse: collapse; }
.miss-table td { padding: 8px 14px; border-bottom: 1px solid var(--panel-border); font-size: 13px; }
.miss-table tr:last-child td { border-bottom: none; }
.miss-count { font-family: var(--mono); font-weight: 500; }
.miss-count.high { color: var(--red); }
.miss-count.low { color: var(--yellow); }
.action-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  font-family: var(--mono); cursor: pointer; }
.action-pill.create { background: var(--accent-soft); color: var(--accent-deep); }
.action-pill.built { background: var(--green-soft); color: var(--green); }

.empty-state { padding: 28px; text-align: center; color: var(--text-dim); font-style: italic; }

.ctrl-btn { background: none; border: 1px solid var(--panel-border); border-radius: 4px;
  padding: 3px 9px; font-size: 11px; color: var(--text-dim); cursor: pointer;
  font-family: var(--sans); transition: all 0.1s; }
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
</style>
</head>
<body>

<script>
// Theme priority: ?theme= URL param (from hub) > system pref > light
(function(){
  const p = new URLSearchParams(location.search).get('theme');
  const s = p === 'dark' || (!p && matchMedia('(prefers-color-scheme:dark)').matches) ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', e => {
  if (e.data?.type === 'hub-theme')
    document.documentElement.setAttribute('data-theme', e.data.value);
});
</script>
<header>
  <div class="brand">
    <div class="dot"></div>
    <span class="title">Corpus</span>
    <span class="sub">corpus-registry.yaml</span>
  </div>
  <div class="header-right">
    <span class="updated" id="updated-ts">—</span>
    <div class="live-dot" title="Live SSE feed"></div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="stat-total">—</div>
    <div class="stat-label">Corpora</div>
  </div>
  <div class="stat">
    <div class="stat-num green" id="stat-stable">—</div>
    <div class="stat-label">Stable</div>
  </div>
  <div class="stat">
    <div class="stat-num yellow" id="stat-draft">—</div>
    <div class="stat-label">Draft</div>
  </div>
  <div class="stat">
    <div class="stat-num blue" id="stat-docs">—</div>
    <div class="stat-label">Registered Docs</div>
  </div>
</div>

<main>

  <!-- Corpus table -->
  <div class="panel">
    <div class="panel-header">
      <h2>Corpus Registry</h2>
      <div style="display:flex;align-items:center;gap:12px">
        <button id="btn-collapse-all" class="ctrl-btn" title="Collapse all groups">⊟ Collapse all</button>
        <button id="btn-expand-all" class="ctrl-btn" title="Expand all groups">⊞ Expand all</button>
        <span class="panel-hint">Click row to inspect</span>
      </div>
    </div>
    <table class="corpus-table" id="corpus-table">
      <thead>
        <tr>
          <th data-col="name">Name <span class="sort-arrow">↕</span></th>
          <th data-col="status">Status <span class="sort-arrow">↕</span></th>
          <th data-col="layer">Layer <span class="sort-arrow">↕</span></th>
          <th data-col="domain">Description</th>
          <th data-col="doc_count">Docs <span class="sort-arrow">↕</span></th>
          <th data-col="file_count">Files <span class="sort-arrow">↕</span></th>
          <th data-col="tier">Tiers</th>
          <th data-col="days_old">Age <span class="sort-arrow">↕</span></th>
          <th data-col="root_exists">Root</th>
        </tr>
      </thead>
      <tbody id="corpus-tbody"></tbody>
    </table>
  </div>

  <!-- Detail panel (hidden until row clicked) -->
  <div class="panel detail-panel" id="detail-panel">
    <div class="panel-header">
      <h2 id="detail-title">—</h2>
      <span class="close-btn" id="detail-close" title="Close">×</span>
    </div>
    <div class="detail-grid" id="detail-body"></div>
  </div>

  <!-- M138: Skills / Agent list -->
  <div class="panel" id="skills-panel" style="margin-top:18px">
    <div class="panel-header">
      <h2>Skills &amp; Agents</h2>
      <span class="panel-hint" id="skills-hint">—</span>
    </div>
    <div id="skills-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0;padding:0"></div>
  </div>

  <!-- Miss log -->
  <div class="panel" id="miss-panel" style="display:none">
    <div class="panel-header">
      <h2>Corpus Miss Log</h2>
      <span class="panel-hint">Domains that failed routing — candidates for <code>/entity -cc</code></span>
    </div>
    <table class="miss-table" id="miss-tbody-wrap">
      <tbody id="miss-tbody"></tbody>
    </table>
  </div>

</main>

<script src="/static/app.js?v=20260518b"></script>
</body>
</html>
