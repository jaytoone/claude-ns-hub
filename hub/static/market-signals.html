<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CTX Channel Manager</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6; --bg-deep: #f0ede7; --panel: #fff; --panel-border: #e4dfd5;
  --text: #1f1c1a; --text-soft: #4a4540; --text-dim: #8a8278;
  --accent: #cc785c; --accent-deep: #a34b2c; --accent-soft: #f5e6de;
  --green: #3d8b5e; --green-soft: #e8f5ee;
  --red: #c0392b; --yellow: #b8860b;
  --serif: "Fraunces", Georgia, serif;
  --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
[data-theme="dark"] {
  --bg: #181614; --bg-deep: #111009; --panel: #222019; --panel-border: #333028;
  --text: #e8e0d6; --text-soft: #b0a89e; --text-dim: #6b6358;
  --accent: #cc785c; --accent-deep: #e8926e; --accent-soft: #2a1e17;
  --green: #4caf78; --green-soft: #0e2318;
  --red: #e05252; --yellow: #d4a017;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-soft); font: 14px/1.6 var(--sans);
  padding: 28px 32px; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

h1 { font-family: var(--serif); font-size: 17px; font-weight: 500; color: var(--text);
  margin-bottom: 4px; }
.subtitle { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; }

/* ── Channel grid ── */
.ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 24px; }
.ch-card { background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 8px; padding: 14px 16px; }
.ch-card.highlight { border-color: var(--accent); background: var(--accent-soft); }
.ch-name { font-family: var(--serif); font-size: 13px; font-weight: 500;
  color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.ch-dot.ok { background: var(--green); }
.ch-dot.warn { background: var(--yellow); }
.ch-dot.err { background: var(--red); }
.ch-metric { font-family: var(--mono); font-size: 15px; font-weight: 600;
  color: var(--text); line-height: 1; }
.ch-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.ch-secondary { font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
.ch-link { font-family: var(--mono); font-size: 10px; color: var(--accent);
  text-decoration: none; margin-top: 6px; display: block; }
.ch-link:hover { text-decoration: underline; }

/* ── Section headers ── */
.section-head { font-family: var(--serif); font-size: 16px; font-weight: 500;
  color: var(--text); margin: 28px 0 14px; display: flex; align-items: center; gap: 10px; }
.section-head .count { font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  background: var(--bg-deep); border: 1px solid var(--panel-border);
  padding: 2px 7px; border-radius: 3px; }

.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.btn { font-family: var(--mono); font-size: 11px; background: none;
  border: 1px solid var(--panel-border); border-radius: 4px; padding: 5px 14px;
  cursor: pointer; color: var(--text-soft); transition: all .12s; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.btn:disabled { opacity: .4; cursor: default; }
.cache-note { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
@media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

.card { background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 8px; padding: 18px 20px; }
.card-title { font-family: var(--serif); font-size: 14px; font-weight: 500;
  color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.card-badge { font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
  background: var(--bg-deep); border: 1px solid var(--panel-border);
  padding: 2px 7px; border-radius: 3px; color: var(--text-dim); }

/* PyPI */
.pypi-big { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 2px; }
.pypi-big span { font-size: 13px; font-weight: 400; color: var(--text-dim); }
.pypi-delta { font-family: var(--mono); font-size: 12px; margin-bottom: 8px; }
.pypi-row { display: flex; gap: 20px; font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); border-top: 1px solid var(--panel-border); padding-top: 8px; margin-top: 8px; }
.daily-chart { display: flex; align-items: flex-end; gap: 1px; height: 48px;
  margin-top: 10px; overflow: visible; }
.day-bar { flex: 1; min-width: 3px; background: var(--accent); border-radius: 1px 1px 0 0;
  opacity: .65; transition: opacity .12s; position: relative; }
.day-bar:hover { opacity: 1; }
.day-bar .tip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%;
  transform: translateX(-50%); background: var(--text); color: var(--bg);
  font-family: var(--mono); font-size: 10px; white-space: nowrap;
  padding: 3px 6px; border-radius: 3px; pointer-events: none; z-index: 10; }
.day-bar:hover .tip { display: block; }
.chart-labels { display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 9px; color: var(--text-dim); margin-top: 2px; }

/* GitHub */
.issue-row { padding: 7px 0; border-bottom: 1px solid var(--panel-border);
  font-size: 12px; line-height: 1.5; }
.issue-row:last-child { border-bottom: none; }
.issue-state { font-family: var(--mono); font-size: 10px; border-radius: 3px;
  padding: 1px 5px; margin-right: 5px; }
.issue-state.open   { background: var(--green-soft); color: var(--green); }
.issue-state.closed { background: var(--bg-deep);    color: var(--text-dim); }
.issue-title { color: var(--text); }
.issue-meta  { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* HN */
.hn-row { padding: 6px 0; border-bottom: 1px solid var(--panel-border);
  font-size: 12px; line-height: 1.5; }
.hn-row:last-child { border-bottom: none; }
.hn-pts { font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  min-width: 44px; display: inline-block; }

/* Wide card */
.card-wide { grid-column: 1 / -1; }

.loading { color: var(--text-dim); font-size: 12px; font-family: var(--mono); }
.error { color: var(--red); font-size: 12px; font-family: var(--mono); }
</style>
</head>
<body>

<h1>CTX Channel Manager</h1>
<p class="subtitle">Live reactions across distribution channels · market demand signals</p>

<div class="toolbar">
  <button class="btn" id="btn-refresh-ch">refresh channels</button>
  <button class="btn" id="btn-refresh">refresh signals</button>
  <button class="btn" id="btn-save">save snapshot</button>
  <span class="cache-note" id="cache-note">—</span>
</div>

<div class="section-head">Distribution Channels <span class="count" id="ch-count">—</span></div>
<div class="ch-grid" id="ch-grid"><div class="loading">loading…</div></div>

<div class="section-head">Market Demand Signals</div>
<div class="grid" id="grid">
  <div class="card" id="card-pypi">
    <div class="card-title">PyPI <span class="card-badge">ctx-retriever</span></div>
    <div class="loading">loading…</div>
  </div>
  <div class="card" id="card-hn">
    <div class="card-title">Hacker News <span class="card-badge">mentions</span></div>
    <div class="loading">loading…</div>
  </div>
  <div class="card card-wide" id="card-gh">
    <div class="card-title">GitHub <span class="card-badge">anthropics/claude-code pain signals</span></div>
    <div class="loading">loading…</div>
  </div>
</div>

<script>
const BASELINE = { day: 39, week: 633, month: 1096 };

function esc(s) {
  return String(s || "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderPypi(pypi, dailyDays) {
  const el = document.getElementById("card-pypi");
  if (!pypi || pypi.error) {
    el.innerHTML = `<div class="card-title">PyPI <span class="card-badge">ctx-retriever</span></div>
      <div class="error">${esc(pypi?.error || "unavailable")}</div>`;
    return;
  }
  const pct   = pypi.pct_week ?? 0;
  const sign  = pct >= 0 ? "+" : "";
  const col   = pct > 15 ? "var(--green)" : pct < -15 ? "var(--red)" : "var(--text-dim)";
  const delta = `<span style="color:${col}">${sign}${pct}% vs baseline</span>`;

  let chartHtml = "";
  if (dailyDays && dailyDays.length > 1) {
    const maxD = Math.max(...dailyDays.map(d => d.downloads), 1);
    const bars = dailyDays.map(d => {
      const h = Math.max(2, Math.round((d.downloads / maxD) * 44));
      const label = d.date.slice(5); // MM-DD
      return `<div class="day-bar" style="height:${h}px"><span class="tip">${label}: ${d.downloads}</span></div>`;
    }).join("");
    const first = dailyDays[0].date.slice(5);
    const last  = dailyDays[dailyDays.length - 1].date.slice(5);
    chartHtml = `
      <div class="daily-chart">${bars}</div>
      <div class="chart-labels"><span>${first}</span><span>${last}</span></div>`;
  }

  el.innerHTML = `
    <div class="card-title">PyPI <span class="card-badge">ctx-retriever</span></div>
    <div class="pypi-big">${pypi.week ?? "—"}<span>/wk</span></div>
    <div class="pypi-delta">${delta}</div>
    ${chartHtml}
    <div class="pypi-row">
      <span>${pypi.day ?? "—"}/day</span>
      <span>${pypi.month ?? "—"}/mo</span>
      <span>baseline ${BASELINE.week}/wk</span>
    </div>`;
}

function renderGH(issues) {
  const el = document.getElementById("card-gh");
  const title = `<div class="card-title">GitHub <span class="card-badge">anthropics/claude-code pain signals</span></div>`;
  if (!issues || !issues.length) {
    el.innerHTML = title + `<div class="loading">no recent matches</div>`; return;
  }
  const rows = issues.slice(0, 10).map(i => `
    <div class="issue-row">
      <span class="issue-state ${esc(i.state)}">${esc(i.state)}</span>
      <a class="issue-title" href="${esc(i.url)}" target="_blank">#${i.number} ${esc((i.title||"").slice(0,80))}</a>
      <div class="issue-meta">${esc(i.created)} · matched: <em>${esc(i.keyword)}</em></div>
    </div>`).join("");
  el.innerHTML = title + rows;
}

function renderHN(hn) {
  const el = document.getElementById("card-hn");
  const title = `<div class="card-title">Hacker News <span class="card-badge">mentions</span></div>`;
  if (!hn || !hn.length) {
    el.innerHTML = title + `<div class="loading">no recent matches</div>`; return;
  }
  const rows = hn.slice(0, 6).map(i => `
    <div class="hn-row">
      <span class="hn-pts">${i.points ?? 0} pts</span>
      <a href="${esc(i.url)}" target="_blank">${esc((i.title||"").slice(0,80))}</a>
      <div class="issue-meta">${esc(i.created)} · matched: <em>${esc(i.keyword)}</em></div>
    </div>`).join("");
  el.innerHTML = title + rows;
}

async function load(forceRefresh = false) {
  document.getElementById("btn-refresh").disabled = true;
  const url = forceRefresh ? "/api/market-signals?refresh=true" : "/api/market-signals";
  const dailyUrl = forceRefresh ? "/api/pypi-daily?refresh=true&days=30" : "/api/pypi-daily?days=30";
  try {
    const [d, daily] = await Promise.all([
      fetch(url).then(r => r.json()),
      fetch(dailyUrl).then(r => r.json()).catch(() => ({ days: [] })),
    ]);
    const sig = d.signals || {};
    renderPypi(sig.pypi, daily.days || []);
    renderGH(sig.github || []);
    renderHN(sig.hn || []);
    const age = d.cached_at ? new Date(d.cached_at * 1000).toLocaleTimeString() : "—";
    document.getElementById("cache-note").textContent = `cached ${age} (TTL ${d.ttl}s)`;
  } catch(e) {
    document.getElementById("cache-note").textContent = "fetch error";
  }
  document.getElementById("btn-refresh").disabled = false;
}

document.getElementById("btn-refresh").addEventListener("click", () => load(true));
document.getElementById("btn-save").addEventListener("click", async () => {
  const btn = document.getElementById("btn-save");
  btn.disabled = true; btn.textContent = "saving…";
  try {
    await fetch("/api/market-signals/save", { method: "POST" });
    btn.textContent = "saved";
  } catch { btn.textContent = "error"; }
  setTimeout(() => { btn.textContent = "save snapshot"; btn.disabled = false; }, 2000);
});

// ── Channel Manager ─────────────────────────────────────────────────────────

function renderChannels(channels) {
  const grid = document.getElementById("ch-grid");
  const countEl = document.getElementById("ch-count");
  if (!channels || !channels.length) {
    grid.innerHTML = `<span class="loading">no data</span>`; return;
  }
  countEl.textContent = `${channels.length} channels`;

  grid.innerHTML = channels.map(ch => {
    const hasErr = !!ch.error;
    const dot = hasErr ? "err" : ch.type === "manual" ? "warn" : "ok";

    let metric = "—", label = "", secondary = "";

    if (ch.id === "github") {
      metric = ch.stars ?? "—";
      label = "stars";
      secondary = `<span>${ch.forks ?? 0} forks</span><span>${ch.issues ?? 0} issues</span>`;
    } else if (ch.id === "hn") {
      metric = ch.points ?? "—";
      label = "points";
      secondary = `<span>${ch.comments ?? 0} comments</span>`;
    } else if (ch.id === "geeknews") {
      metric = ch.points ?? "—";
      label = "points";
      secondary = `<span>${ch.comments ?? 0} comments</span>`;
    } else if (ch.id === "devto") {
      metric = ch.reactions ?? "—";
      label = "reactions";
      secondary = `<span>${ch.comments ?? 0} comments</span>${ch.reads ? `<span>${ch.reads} reads</span>` : ""}`;
    } else if (ch.id === "pypi") {
      metric = ch.week ?? "—";
      label = "/wk";
      secondary = `<span>${ch.day ?? 0}/day</span><span>${ch.month ?? 0}/mo</span>`;
    } else if (ch.id === "linkedin") {
      metric = "manual";
      label = "check required";
    }

    const isHighlight = ch.id === "github" && (ch.stars || 0) > 0;
    return `
      <div class="ch-card${isHighlight ? " highlight" : ""}">
        <div class="ch-name">
          <div class="ch-dot ${dot}"></div>
          ${esc(ch.name)}
        </div>
        ${hasErr
          ? `<div class="ch-label" style="color:var(--red)">${esc(ch.error)}</div>`
          : `<div class="ch-metric">${esc(String(metric))}</div>
             <div class="ch-label">${esc(label)}</div>
             ${secondary ? `<div class="ch-secondary">${secondary}</div>` : ""}`
        }
        <a class="ch-link" href="${esc(ch.url)}" target="_blank">${esc(ch.url.replace("https://","").slice(0,30))}…</a>
      </div>`;
  }).join("");
}

async function loadChannels(forceRefresh = false) {
  document.getElementById("btn-refresh-ch").disabled = true;
  const url = forceRefresh ? "/api/channel-status?refresh=true" : "/api/channel-status";
  try {
    const d = await fetch(url).then(r => r.json());
    renderChannels(d.channels || []);
  } catch(e) {
    document.getElementById("ch-grid").innerHTML = `<span class="loading">fetch error</span>`;
  }
  document.getElementById("btn-refresh-ch").disabled = false;
}

document.getElementById("btn-refresh-ch").addEventListener("click", () => loadChannels(true));

loadChannels();
load();
(function(){const s=localStorage.getItem('hub-theme');if(s==='dark'||(s==null&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark')})();
window.addEventListener('message',e=>{if(e.data?.type==='hub-theme')document.documentElement.setAttribute('data-theme',e.data.value)});
</script>
</body>
</html>
