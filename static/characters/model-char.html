<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; width:110px; height:180px; overflow:hidden; }

.char {
  width:110px; height:180px;
  position:relative;
  overflow:hidden;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
}

/* silhouette base — SVG path drawn via clip-path */
.figure {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:90px; height:150px;
}

.glow {
  position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  width:90px; height:100px;
  border-radius:50%;
  filter:blur(20px);
  opacity:0.35;
}

.label {
  position:absolute; bottom:6px; left:0; right:0;
  text-align:center;
  font-family:'Arial', sans-serif;
  font-size:8px;
  letter-spacing:.1em;
  font-weight:700;
  opacity:0.8;
}

.noise {
  position:absolute; inset:0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px
  );
}
</style>
</head>
<body>
<div class="char" id="card" style="background: var(--bg);">
  <div class="glow" style="background: var(--col);"></div>
  <svg class="figure" viewBox="0 0 90 150" xmlns="http://www.w3.org/2000/svg">
    <!-- head -->
    <ellipse cx="45" cy="22" rx="16" ry="18" fill="var(--col)" opacity=".85"/>
    <!-- hair top -->
    <ellipse cx="45" cy="12" rx="17" ry="10" fill="var(--dark)" opacity=".9"/>
    <!-- hair side left -->
    <path d="M28 18 Q22 35 26 55 Q34 40 32 25 Z" fill="var(--dark)" opacity=".9"/>
    <!-- hair side right -->
    <path d="M62 18 Q68 35 64 55 Q56 40 58 25 Z" fill="var(--dark)" opacity=".9"/>
    <!-- neck -->
    <rect x="40" y="38" width="10" height="12" rx="3" fill="var(--col)" opacity=".7"/>
    <!-- shoulders/body -->
    <path d="M18 65 Q20 50 45 50 Q70 50 72 65 L74 130 Q60 140 45 142 Q30 140 16 130 Z"
          fill="var(--col)" opacity=".6"/>
    <!-- collar -->
    <path d="M35 50 L45 62 L55 50" fill="none" stroke="var(--bright)" stroke-width="1.5" opacity=".5"/>
    <!-- face features -->
    <ellipse cx="39" cy="25" rx="3" ry="3.5" fill="var(--bright)" opacity=".6"/>
    <ellipse cx="51" cy="25" rx="3" ry="3.5" fill="var(--bright)" opacity=".6"/>
    <ellipse cx="39" cy="25" rx="1.5" ry="2" fill="var(--dark)"/>
    <ellipse cx="51" cy="25" rx="1.5" ry="2" fill="var(--dark)"/>
    <!-- mouth -->
    <path d="M41 33 Q45 36 49 33" fill="none" stroke="var(--bright)" stroke-width="1" opacity=".5"/>
    <!-- model icon top right -->
    <text x="72" y="16" font-size="10" fill="var(--bright)" opacity=".7" text-anchor="middle"
          font-family="monospace" font-weight="bold" id="icon">◆</text>
  </svg>
  <div class="label" style="color:var(--bright)" id="lbl">MODEL</div>
  <div class="noise"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const m = params.get('m') || 'claude';
const MODELS = {
  claude:   {col:'#D4775C', dark:'#1a0800', bright:'#FFD4B8', bg:'#0d0400', icon:'C', label:'CLAUDE'},
  gpt4o:    {col:'#10A37F', dark:'#001a0d', bright:'#7FFFD4', bg:'#000d07', icon:'G', label:'GPT-4o'},
  gemini:   {col:'#4285F4', dark:'#00082a', bright:'#A8C8FF', bg:'#000510', icon:'✦', label:'GEMINI'},
  kimi:     {col:'#7C5CFF', dark:'#0a001a', bright:'#D4BFFF', bg:'#050010', icon:'K', label:'KIMI'},
  haiku:    {col:'#E8B84B', dark:'#1a0e00', bright:'#FFF0B3', bg:'#0a0700', icon:'俳', label:'HAIKU'},
  deepseek: {col:'#00C4CC', dark:'#001a1a', bright:'#AAFFFF', bg:'#00080a', icon:'D', label:'DEEPSEEK'},
};
const cfg = MODELS[m] || MODELS.claude;
const root = document.documentElement;
document.getElementById('card').style.setProperty('--col', cfg.col);
document.getElementById('card').style.setProperty('--dark', cfg.dark);
document.getElementById('card').style.setProperty('--bright', cfg.bright);
document.getElementById('card').style.setProperty('--bg', cfg.bg);
document.getElementById('icon').textContent = cfg.icon;
document.getElementById('lbl').textContent = cfg.label;
</script>
</body>
</html>
