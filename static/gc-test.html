<!DOCTYPE html>
<html>
<head>
<style>
:root { --text-dim: #8a8278; --panel-border: #e4dfd5; --text: #1f1c1a; --bg: #faf9f6; }
body { font: 12px system-ui; background: var(--bg); padding: 20px; }
.nt-table { width: 100%; border-collapse: collapse; }
.nt-table td { padding: 6px 8px; border-right: 1px solid var(--panel-border); border-bottom: 1px solid var(--panel-border); }
.nt-table tr.nt-draggable-row td { border-bottom: 1px solid var(--panel-border); }
.ms-child-row td { background: rgba(0,0,0,.02); }
/* M980 grandchild grouping */
.ms-grandchild-row td { background: rgba(130,130,120,0.05) !important; }
.ms-grandchild-row:first-of-type td { border-top: 1px dashed rgba(100,100,90,.3) !important; }
.ms-grandchild-row td:first-child { box-shadow: inset 6px 0 0 rgba(100,100,90,.35); }
.ms-group.has-children tr:first-child td { border-top: 2px solid var(--text-dim) !important; }
.ms-group.has-children tr:last-child td { border-bottom: 2px solid var(--text-dim) !important; }
</style>
</head>
<body>
<h3 style="font-family:sans-serif;color:#444">손자 스톤 그루핑 테두리 (M980)</h3>
<table class="nt-table">
<tbody class="ms-group has-children">
  <tr class="nt-draggable-row"><td>⋮⋮</td><td style="font-weight:600">M52 부모 스톤 (L0)</td><td>queue</td></tr>
</tbody>
<tbody class="ms-group has-children">
  <tr class="ms-child-row nt-draggable-row"><td>⋮⋮</td><td style="padding-left:16px">M52.8 자녀 스톤 (L1)</td><td>pending</td></tr>
  <tr class="ms-child-row ms-grandchild-row nt-draggable-row"><td>⋮⋮</td><td style="padding-left:32px">M52.8.1 손자 스톤 (L2) ← 배경 틴트 적용</td><td>queued</td></tr>
</tbody>
<tbody class="ms-group has-children">
  <tr class="nt-draggable-row"><td>⋮⋮</td><td style="font-weight:600">M63 다른 부모 스톤 (L0)</td><td>queue</td></tr>
</tbody>
</table>
<p style="font-size:10px;color:#888;margin-top:12px">손자 스톤(L2): 배경 5% tint + 상단 점선 + 좌측 6px 인셋 박스</p>
</body>
</html>
