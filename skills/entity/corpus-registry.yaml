name: monetization
primary_domain: go_to_market
related_domains: [demand_theory, product, marketing_growth]
layer: L2
domain: "SaaS / AI pricing models / monetization strategy / revenue model design"
trigger:
  - monetization, 수익화, pricing model, price model, saas pricing, revenue model
  - usage-based, usage based, outcome-based, outcome based, freemium, flat-rate
  - seat pricing, hybrid pricing, ltv cac, ltv:cac, gross margin
  - 가격 모델, 가격 전략, 수익 모델, 과금, 수익, 마진, 유료화
  - cogs, payback period, nrr, net revenue retention, value metric
  - bill shock, enterprise pricing, 구독제, 요금제
corpus_root: /home/desk-1/Project/Ameva/docs/research/
docs:
  T1: 20260412-monetization-theory.md
  T4: 20260412-monetization-falsification.md
  D1: 20260412-monetization-diagnostic.md
  S1: 20260412-monetization-playbook.md
taxonomy_groups:
  이론: [T1, T4]
  진단: [D1]
  전략: [S1]
core_theory: |
  Models: flat-rate/seat, usage-based (UBP), outcome-based, hybrid.
  67%+ SaaS >$10M ARR use hybrid/UBP. AI-native margin: 50-65% (vs 75-85% traditional).
  Value metric = unit correlated with customer success AND vendor COGS.
  LTV:CAC > 3 = healthy; > 5 = underpriced. Freemium needs K>0.3 + clear paywall.
  UBP needs COGS floor (price >= 3x inference cost) + customer predictability.
scope_gate:
  - "Pricing/revenue model selection or design인가?"
  - "Monetization mechanics (UBP, freemium, outcome-based, hybrid)인가?"
  - "SaaS/AI unit economics (LTV, CAC, gross margin, NRR, COGS)인가?"
out_action: "demand_theory for WTP; marketing_growth for acquisition; generic for feature design"
sycophancy_checks:
  Q1: "UBP default for AI? Needs COGS floor + predictability. [T4 HC-1]"
  Q2: "80%+ gross margin for AI-native? Realistic: 50-65%. [T4 HC-3]"
  Q3: "Freemium without viral loop? Charity tier risk. [T4 HC-5]"
  Q4: "Copying competitor price without value metric check? [T4 HC-4]"
  Q5: "Outcome-based without attribution? Contract failure. [T4 HC-6]"
  Q6: "Revenue growth = model success? Check NRR + gross margin. [T4 HC-2]"
gap_patterns:
  no_cogs_check: "Pricing without COGS/margin data -> ask for inference cost first"
  no_gtm_alignment: "Model without GTM motion -> PLG vs SLG determines model"
  no_value_metric: "Pricing without value metric -> route to D1 selection step"
  freemium_no_loop: "Freemium without viral loop mention -> charity_tier_risk"
  ltv_cac_unknown: "Scaling without LTV:CAC data -> diagnostic required"
rwr_hints:
  "어떻게 돈을 받을까": "pricing model selection (D1 diagnostic)"
  "얼마로 책정할까": "value metric + competitive pricing (D1 + T1)"
  "무료 티어": "freemium design + viral loop prerequisite (S1)"
  "구독 vs 종량제": "flat-rate vs usage-based comparison (T1 + D1)"
  "AI 제품 마진": "AI COGS structure, inference cost floor (T1)"
  "수익이 안 나요": "LTV:CAC + NRR + gross margin diagnostic (D1)"
  "요금제 설계": "tier design + paywall moment (S1)"
  "결과 기반 가격": "outcome-based + attribution requirements (T4)"
status: stable

