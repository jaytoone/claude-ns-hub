corpus_root: /home/desk-1/Project/Entity/docs/research/
docs:
  T1: 20260416-human-edge-theory.md                 # PRIMARY — 9 primitives + user outline mapping + biases
  T4: 20260416-human-edge-falsification.md          # 반증 기준 + 문화 경계 + 대체 설명 + WEIRD 편향
  D1: 20260416-human-edge-diagnostic.md             # 13-문항 제품/랜딩페이지 감사 체크리스트
  S1: 20260416-human-edge-playbook.md               # 9 primitives × AARRR matrix + 3 시나리오 블루프린트 + Kill Switch
  V1: 20260416-human-edge-experiment.md             # Pain of Payment × Mental Accounting 2x2 factorial A/B (pre-registered)
taxonomy_groups:
  이론: [T1, T4]
  진단: [D1]
  전략: [S1]
  검증: [V1]
core_theory: |
  2-system model: 95% 결정은 System 1 (빠름·감정·S1 하드웨어). 나머지 5%와 사후정당화가 System 2.
  3 drives: S(Survival 손실회피 2.25x) + P(Position 지위·평판) + E(Energy 인지절약).
  9 hardware primitives: Scarcity / Social Proof / Loss Aversion / Anchoring / Reciprocity
     / Commitment / Novelty / Meta-Insight / Status Signaling.
  Spending Pockets 4 conditions: Hedonic-Justified / Mental Accounting 분리 / Pain-of-Payment 최소 / Status-identity.
  "빠짐"(dependency trap) = 단기 LTV↑ 장기 Ethical_Coefficient↓ — human-edge 악용의 부메랑.
  human_edge = L1 hardware substrate → wtp = L2 identity-gap demand theory (D(WTP) multiplier 공급원).
scope_gate:
  - "소비자/사용자 System 1 반응이 유의미한 비중인 결정인가?"
  - "측정/실험 가능한 레버인가? (철학적 담론 제외)"
  - "마케팅/UX/제품 설계 또는 설득 전략과 직접 연결되는가?"
out_action: "고관여 B2B 합의제 구매는 sales/MEDDIC 프레임; 조직/전략 구조는 strategy/gtm; 순수 이론 논의는 생략"
sycophancy_checks:
  Q1: "Cialdini 6을 그대로 재탕하지 않았는가? 2020s 메타분석은 권위↓, peer>authority 변동 반영했는가? [T1 HC-1]"
  Q2: "단일 실험(잔디간판/호텔수건/팁)을 일반법칙으로 포장하지 않았는가? replication + 문화 의존성 표시? [T1 HC-2]"
  Q3: "손실회피 2.25x를 한국 실거래에 직접 이식? 실거래 유효 배율 1.4-1.8x 보정 했는가? [T1 HC-3]"
  Q4: "'인간은 비합리적'만 강조하지 않았는가? System 2 최종결재 경로 표시? [T1 HC-4]"
  Q5: "다크패턴과 합법적 설득 경계 구분했는가? 2024 EU DSA + KR 소비자법 리스크 표시? [T1 HC-5]"
  Q6: "문화 보정 했는가? 개인주의 vs 집단주의 반전 사례 표시? [T1 HC-6]"
  Q7: "'빠짐' 장기 리스크(Ethical_Coefficient) 표시 없이 레버 추천하지 않았는가? [T1 HC-7]"
gap_patterns:
  no_s1_trigger: "제품 설명 전부 기능 스펙 → System 2만 자극, 95% 경로 놓침"
  no_scarcity_or_status: "희소성/지위 신호 제로 → 구매 긴급성 낮음, 전환률 천장 낮음"
  no_social_proof: "리뷰/사용자수/UGC 전무 → E 레버 부재, 첫 구매 허들 증가"
  dark_pattern_heavy: "환불장벽/강제자동갱신/강요 popup → 단기 수치↑ 장기 Ethical_Coefficient↓"
  novelty_fatigue: "주 단위 대규모 업데이트 → 인지 과부하, 의사결정 피로 축적"
  status_misread: "공개 과시 레버를 '조용한 럭셔리' 층에 적용 → 세그먼트 오인식"
  pain_of_payment_high: "결제 단계 많음 / 현금·송금 기반 → 전환률 구조적 제한"
