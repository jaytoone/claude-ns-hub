  Win_Rate_Lift = f(External_Buyer_Interviews, Battlecard_Adoption, CI_Cadence) → +15-50%
  Root_Cause_Bias: 85% CRM loss data is wrong → external buyer interview is ground truth
  Maturity_Stages: Starter (<$1M, <$5k) → Growth ($1-10M, $10-25k) → Enterprise (>$10M, $50k+)
  Activation_Formula: Battlecard_Effectiveness = Recency × Specificity × Sales_Adoption_Rate
  3_Layer_Stack: Collect (signals) → Analyze (frameworks) → Activate (delivery)
scope_gate:
  - "B2B context (structured procurement, ≥1 stakeholder)?"
  - "Goal is competitive positioning or deal-level sales enablement?"
  - "≥1 active competitor or substitute exists in market?"
out_action: "B2C: consumer intelligence / social listening frameworks. No competitors: category creation playbook. Customer discovery: JTBD framework."
sycophancy_checks:
  Q1: "more tools = better CI? No — strategy first, tool stack second. Maturity-matched investment required [T4 HC-1]"
  Q2: "CRM loss data = ground truth? No — 85% error rate. External interviews required [T4 HC-2]"
  Q3: "CI = one person's job? No — cross-functional program (PMM + Sales + Product + CS) [T4 HC-3]"
  Q4: "real-time monitoring = priority for all stages? No — Enterprise tier only; Starter/Growth: quarterly [T4 HC-4]"
  Q5: "feature lists = CI? No — positioning/ICP changes are the real signal [T4 HC-5]"
  Q6: "annual audit = sufficient? No — monthly battlecard refresh + quarterly positioning audit minimum [T4 HC-6]"
  Q7: "AI CI tools replace buyer interviews? No — AI handles collection, humans handle win-loss ground truth [T4 HC-7]"
gap_patterns:
  no_win_loss_program: "win/loss discussed without external buyer interviews → 85% error rate risk"
  tool_before_strategy: "CI tool selection before workflow design → stacked tools with no ROI"
  feature_list_as_ci: "competitor feature matrix as primary output → positioning/ICP shifts missed"
  single_owner: "CI program with single owner → cross-functional blind spots; CS/Sales signals lost"
  static_battlecards: "battlecards mentioned without update cadence → stale at deal time"
rwr_hints:
  "why are we losing deals": "win-loss analysis, external buyer interview, loss reason taxonomy"
  "competitor is winning": "battlecard, competitive positioning, CI program"
  "competitive intelligence": "CI Stack (Collect→Analyze→Activate), maturity stage"
  "win rate": "win-loss analysis, battlecard adoption rate, CI cadence"
  "battle card": "battlecard (sales activation layer of CI)"
  "why did we lose": "external buyer interview, not CRM data (85% error rate)"
status: stable

