# ─── corpus: driller ──────────────────────────────────────────────────────────
name: driller
primary_domain: go_to_market
related_domains: [monetization, marketing_growth, demand_theory]
layer: L3
domain: "AI-tech monetization drill-down: vertical/persona/use-case → value metric → pricing model; outcome attributability latency; PLG field analysis; COGS floor by vertical"
trigger:
  - driller, drill down, drill-down, vertical selection, industry selection
  - outcome attributability, attributability latency, attribution latency
  - AI vertical, AI industry, AI persona, AI use case, value metric selection
  - PLG by vertical, PLG field, PLG viable, PLG precondition
  - COGS floor, inference cost, AI margin, AI profitability
  - data flywheel, flywheel moat, usage signal, cross-user
  - legal AI, healthcare AI, developer tools AI, sales AI, fintech AI
  - open-core, free tier strategy, cloud vault, team paywall
  - kill criteria, exit vertical, WTP ceiling
corpus_root: /home/desk-1/Project/Driller/docs/research/
docs:
  T1: 20260507-driller-theory.md
  T4: 20260507-driller-falsification.md
  D1: 20260507-driller-diagnostic.md
  S1: 20260507-driller-playbook.md
taxonomy_groups:
  이론: [T1, T4]
  진단: [D1]
  전략: [S1]
core_theory: |
  AI_monetization_fitness = f(outcome_attributability, decision_frequency, COGS/query_ratio)
  5-layer drill: Industry → Persona → Use Case → Value Metric → Pricing Model
  Outcome Attributability Latency = most predictive variable for pricing model selection.
    Short latency (legal/dev/sales) → outcome-based viable
    Long latency (marketing/healthcare outcomes) → UBP or seat proxy only
  PLG preconditions: unified buyer/user identity AND sub-$500 ACV (both required)
  COGS floor: price >= 3x (inference + pipeline + overhead) regardless of model
  Data flywheel moat: algorithm is NOT the moat; accumulated usage signal is
  Kill criterion: WTP_ceiling < COGS_floor × 3 → exit vertical
scope_gate:
  - "AI-native product (inference cost is real COGS component)?"
  - "B2B or prosumer context (not consumer impulse)?"
  - "Quantifiable AI output (measurable value unit exists)?"
  out_action: "Standard SaaS → monetization corpus (L2). Viral growth → marketing_growth. Demand genesis → wtp."
sycophancy_checks:
  Q1: "Industry selected before attribution check? Run Step 1 (latency) first — industry ≠ pricing model. [T4 HC-1]"
  Q2: "PLG assumed for enterprise devs? Enterprise fails sub-$500 precondition — SLG required. [T4 HC-2]"
  Q3: "High WTP = high margin assumed? COGS floor still applies — legal high WTP + high inference = not automatically profitable. [T4 HC-3]"
  Q4: "Outcome-based for healthcare? Liability creates structural barrier — long latency forces seat-based. [T4 HC-4]"
  Q5: "Dev tools consumer pricing below $60? COGS check: 200-400 calls/day × $0.003-0.01 → $18-60 COGS floor. [T1 §7]"
  Q6: "Data flywheel from per-user data? Per-user flywheel ≠ moat — cloud aggregation required for cross-user flywheel. [T1 §8]"
gap_patterns:
  industry_before_attribution: "Industry named without attribution latency check → pricing model selection blocked"
  plg_without_preconditions: "PLG motion proposed without checking buyer/user identity AND ACV < $500"
  cogs_blind_dev_tools: "Dev tools pricing set without COGS math (200-400 calls/day inference check)"
  flywheel_without_cloud: "Data moat claimed without cloud aggregation layer design"
  high_wtp_no_gtm: "Legal/finance targeted without enterprise sales motion (SLG) plan"
rwr_hints:
  "which industry should I target": "Layer 1 vertical selection + diagnostic Step 1 (attribution latency)"
  "what pricing model": "Outcome Attributability Latency → pricing model decision tree (T1 §3)"
  "should we do PLG": "PLG precondition check (D1 §3): unified buyer/user + sub-$500 ACV"
  "how to monetize AI": "5-layer drill-down (T1 §2) → start with use case → value metric → COGS floor"
  "data moat": "data flywheel: per-user vs cross-user (T1 §8) — cloud aggregation required"
  "dev tools pricing": "COGS floor for high-frequency inference (T1 §7) — check $18-60/user/month"
  "legal AI": "Short attribution latency → outcome-based viable, SLG required, COGS pressure LOW (T1 §4)"
  "kill criteria": "WTP < COGS × 3 → exit (T4 §3)"
status: stable

