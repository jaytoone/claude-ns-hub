# ─── corpus: marketing_growth ───��─────────────────────────────────────────────
name: marketing_growth
primary_domain: go_to_market
related_domains: [demand_theory, product, pricing]
layer: L2
domain: "Viral growth / K-factor / growth loops / user acquisition channels"
trigger:
  - viral, virality, k-factor, k factor, growth loop, viral loop, referral loop
  - viral coefficient, user acquisition, growth channel, PLG, product-led growth
  - CAC reduction, organic growth, loop velocity, cycle time
  - 마케팅, 바이럴, 성장 루프, 사용자 획득, 채널, 획득, 리퍼럴
corpus_root: /home/desk-1/Project/Ameva/docs/research/
docs:
  T1: 20260412-marketing-growth-theory.md
  T4: 20260412-marketing-growth-falsification.md
  D1: 20260412-marketing-growth-diagnostic.md
  S1: 20260412-marketing-growth-loop-playbook.md
taxonomy_groups:
  이론: [T1, T4]
  진단: [D1]
  전략: [S1]
core_theory: |
  K-factor = invitations_per_user x invitation_conversion_rate.
  K > 1.0 = theoretically self-sustaining; most operate at K=0.4-0.8.
  Cycle time is the compounding multiplier. Activation rate is most predictive.
  5 archetypes: viral/referral, PLG, content SEO, UGC/community, paid reinvestment.
scope_gate:
  - "Growth rate / referral / acquisition cost optimization인가?"
  - "Loop design / viral coefficient diagnosis인가?"
  - "PLG / freemium conversion / embedded virality인가?"
out_action: "PLG/AARRR for non-viral; demand_theory for WTP/pricing; product for feature design"
sycophancy_checks:
  Q1: "K>1.0 achievable? Most products K=0.3-0.7. [T4 HC-1]"
  Q2: "Viral = marketing tactic? No, product architecture. [T4 HC-4]"
  Q3: "Optimizing K before activation? Activation first. [T4 HC-2]"
  Q4: "Citing Slack/Facebook K-factors as targets? Outliers. [T4 HC-5]"
  Q5: "Measuring by invitation volume not retained users? Trust erosion. [T4 HC-3]"
gap_patterns:
  loop_archetype_mismatch: "Non-collaborative product + PLG request -> incentivized referral"
  k_factor_overreach: "K>1.0 target -> reframe to K=0.3-0.7 CAC reduction value"
  activation_blind_spot: "Loop discussion without activation rate -> measurement gap"
  trust_erosion_risk: "High-freq invite prompts -> anti-spam check"
  vanity_viral_metrics: "High invites without retention -> redirect to 30-day retention"
rwr_hints:
  "go viral": "viral loop (K-factor, loop archetype, cycle time)"
  "word of mouth": "referral loop / UGC loop / viral coefficient"
  "growth hack": "loop mechanics / activation optimization"
  "paid vs organic": "CAC structure / loop supplementation"
  "referral program": "incentivized viral loop / two-sided incentive"
  "채널 전략": "loop archetype selection / PLG vs incentivized vs content SEO"
  "사용자 획득": "K-factor diagnostic / activation rate / loop velocity"
status: stable

