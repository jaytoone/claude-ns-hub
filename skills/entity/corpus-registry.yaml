# Entity Corpus Registry — external file (referenced by SKILL.md)
# Each corpus = independent domain knowledge unit. New domain = new corpus block.

# ─── Schema ───────────────────────────────────────────────────────────────────
# name: {corpus_name}
# primary_domain: demand_theory | go_to_market | product | research
# related_domains: [...]          # cross-domain fallback (confidence=0.30)
# layer: L1 (pure theory) | L2 (applied) | L3 (product-specific)
# domain: "{description}"
# trigger: ["{keywords}"]         # Corpus Router keyword detection
# corpus_root: {absolute_path}
# docs: {ID: filename}            # read_corpus(ID) -> Read(corpus_root + filename)
# taxonomy_groups: {group: [doc_ids]}
# core_theory: |                  # always injected into context
# scope_gate: ["{condition}?"]    # all YES -> IN; any NO -> out_action
# sycophancy_checks: {Q1: "...", ...}  # 7 recommended
# gap_patterns: {name: "signal -> meaning"}  # 3-5 recommended
# rwr_hints: {"surface_term": "taxonomy_term"}
# product_docs: [doc_ids]         # optional: product-specific docs
# status: draft | stable

